<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; }
canvas { display: block; cursor: grab; }
canvas:active { cursor: grabbing; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: rgba(15, 15, 25, 0.95); border-bottom: 1px solid #2a2a3a;
  display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 10;
  backdrop-filter: blur(8px);
}
#toolbar .logo { font-size: 16px; font-weight: 700; color: #8b5cf6; letter-spacing: 1px; }
#toolbar .sep { width: 1px; height: 24px; background: #2a2a3a; }

.overlay-btn {
  padding: 4px 12px; border-radius: 4px; border: 1px solid #2a2a3a;
  background: transparent; color: #888; font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.15s; position: relative;
}
.overlay-btn:hover { border-color: #555; color: #ccc; }
.overlay-btn.active { background: #8b5cf6; border-color: #8b5cf6; color: #fff; }

.overlay-btn .btn-tooltip {
  display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  margin-top: 8px; padding: 10px 14px; background: rgba(15, 15, 25, 0.98);
  border: 1px solid #2a2a3a; border-radius: 6px; font-size: 11px; color: #ccc;
  width: 220px; white-space: normal; line-height: 1.5; z-index: 30;
  pointer-events: none; text-align: left;
}
.overlay-btn:hover .btn-tooltip { display: block; }
.overlay-btn .btn-tooltip strong { color: #8b5cf6; }
.overlay-btn .btn-tooltip kbd { background: #1a1a2a; padding: 1px 5px; border-radius: 3px; font-size: 10px; color: #aaa; }

#legend {
  position: fixed; bottom: 48px; left: 16px; font-size: 11px; z-index: 10;
  background: rgba(15, 15, 25, 0.9); border: 1px solid #2a2a3a;
  border-radius: 6px; padding: 10px 14px; line-height: 1.8;
}
#legend .legend-title { font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; margin-bottom: 4px; }
#legend .legend-row { display: flex; align-items: center; gap: 8px; }
#legend .legend-circle { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
#legend .legend-grad { width: 80px; height: 8px; border-radius: 4px; flex-shrink: 0; }

#search {
  margin-left: auto; padding: 6px 12px; border-radius: 4px;
  border: 1px solid #2a2a3a; background: #111118; color: #e0e0e0;
  font-size: 12px; width: 240px; font-family: inherit;
}
#search::placeholder { color: #555; }
#search:focus { outline: none; border-color: #8b5cf6; }

#tooltip {
  position: fixed; display: none; padding: 12px 16px; border-radius: 8px;
  background: rgba(15, 15, 25, 0.95); border: 1px solid #2a2a3a;
  font-size: 12px; pointer-events: none; z-index: 20; max-width: 400px;
  backdrop-filter: blur(8px); line-height: 1.6;
}
#tooltip .tt-title { font-weight: 700; color: #8b5cf6; font-size: 14px; margin-bottom: 4px; }
#tooltip .tt-path { color: #666; font-size: 11px; margin-bottom: 8px; }
#tooltip .tt-row { display: flex; justify-content: space-between; gap: 24px; }
#tooltip .tt-label { color: #888; }
#tooltip .tt-value { color: #e0e0e0; font-weight: 600; }
#tooltip .tt-bar { height: 4px; border-radius: 2px; margin-top: 4px; }

#detail-panel {
  position: fixed; right: -400px; top: 48px; bottom: 0; width: 400px;
  background: rgba(15, 15, 25, 0.98); border-left: 1px solid #2a2a3a;
  transition: right 0.2s ease; z-index: 15; overflow-y: auto; padding: 20px;
  backdrop-filter: blur(8px);
}
#detail-panel.open { right: 0; }
#detail-panel .dp-close {
  position: absolute; top: 12px; right: 12px; background: none; border: none;
  color: #666; font-size: 18px; cursor: pointer;
}
#detail-panel .dp-title { font-size: 18px; font-weight: 700; color: #8b5cf6; margin-bottom: 4px; }
#detail-panel .dp-path { color: #666; font-size: 12px; margin-bottom: 16px; }
#detail-panel .dp-section { margin-top: 16px; }
#detail-panel .dp-section h3 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#detail-panel .dp-metric { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a2a; }
#detail-panel .dp-caller { padding: 4px 8px; margin: 2px 0; background: #1a1a2a; border-radius: 4px; font-size: 12px; cursor: pointer; }
#detail-panel .dp-caller:hover { background: #2a2a3a; }

#breadcrumb {
  position: fixed; bottom: 16px; left: 16px; display: flex; gap: 4px;
  font-size: 12px; z-index: 10;
}
#breadcrumb span {
  padding: 4px 10px; background: rgba(15, 15, 25, 0.9); border: 1px solid #2a2a3a;
  border-radius: 4px; cursor: pointer;
}
#breadcrumb span:hover { border-color: #8b5cf6; }
#breadcrumb .bc-sep { background: none; border: none; color: #555; cursor: default; padding: 4px 2px; }

#stats {
  position: fixed; bottom: 16px; right: 16px; font-size: 11px; color: #555; z-index: 10;
}
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">STRATA</span>
  <div class="sep"></div>
  <button class="overlay-btn active" data-overlay="safety">Safety
    <span class="btn-tooltip"><strong>Agent Safety Rating</strong><br>Green = safe to send agents. Yellow = review carefully. Red = needs briefing. <kbd>1</kbd></span>
  </button>
  <button class="overlay-btn" data-overlay="ripple">Ripple
    <span class="btn-tooltip"><strong>Change Ripple</strong><br>How far changes cascade. High = touching this affects many files. <kbd>2</kbd></span>
  </button>
  <button class="overlay-btn" data-overlay="context">Context Cost
    <span class="btn-tooltip"><strong>Context Cost</strong><br>Estimated tokens an agent needs to safely work here. <kbd>3</kbd></span>
  </button>
  <button class="overlay-btn" data-overlay="implicit">Implicit Coupling
    <span class="btn-tooltip"><strong>Implicit Couplings</strong><br>Files that co-change without import links. Agents will miss these. <kbd>4</kbd></span>
  </button>
  <button class="overlay-btn" data-overlay="blast">Blast Radius
    <span class="btn-tooltip"><strong>Blast Radius</strong><br>Transitive callers affected if this function breaks. <kbd>5</kbd></span>
  </button>
  <input id="search" type="text" placeholder="Search functions... (/ to focus, Enter to zoom)">
</div>

<canvas id="canvas"></canvas>

<div id="tooltip"></div>

<div id="detail-panel">
  <button class="dp-close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

<div id="legend">
  <div class="legend-title">Agent Risk</div>
  <div class="legend-row"><div class="legend-circle" style="background:rgba(40,180,80,0.5)"></div> Safe — send any agent</div>
  <div class="legend-row"><div class="legend-circle" style="background:rgba(220,180,40,0.5)"></div> Caution — review output</div>
  <div class="legend-row"><div class="legend-circle" style="background:rgba(220,50,50,0.5)"></div> Danger — needs briefing</div>
  <div class="legend-row" style="margin-top:4px"><span style="color:#666">Circle size</span> = lines of code</div>
  <div class="legend-row" style="margin-top:4px"><span style="color:#666">Color</span> = selected overlay metric</div>
</div>
<div id="breadcrumb"></div>
<div id="stats"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const searchInput = document.getElementById('search');
const detailPanel = document.getElementById('detail-panel');
const breadcrumb = document.getElementById('breadcrumb');
const statsEl = document.getElementById('stats');

let data = null;
let packed = null;
let camera = { x: 0, y: 0, zoom: 1 };
let targetCamera = { x: 0, y: 0, zoom: 1 };
let animating = false;
let hoveredNode = null;
let selectedNode = null;
let currentOverlay = 'safety';
let searchTerm = '';
let zoomStack = [];
let blastHighlight = new Set();
let dragStart = null;
let isDragging = false;
let renderScheduled = false;
let overlayMaxCache = {};
let churnMap = new Map();
let hotspotMap = new Map();
let blastMap = new Map();
let riskMap = new Map();
let rippleMap = new Map();

function scheduleRender() {
  if (renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(() => { renderScheduled = false; render(); });
}

function precomputeOverlayData() {
  churnMap.clear(); hotspotMap.clear(); blastMap.clear(); riskMap.clear(); rippleMap.clear();
  for (const c of data.churn) churnMap.set(c.filePath, c);
  for (const h of data.hotspots) hotspotMap.set(h.entityId, h);
  for (const b of data.blastRadius) blastMap.set(b.entityId, b);
  if (data.agentRisk) for (const r of data.agentRisk) riskMap.set(r.entityId, r);
  if (data.changeRipple) for (const r of data.changeRipple) rippleMap.set(r.entityId, r);

  overlayMaxCache = {
    safety: 1,
    ripple: Math.max(1, ...(data.changeRipple || []).map(r => r.rippleScore)),
    context: Math.max(1, ...(data.agentRisk || []).map(r => r.contextCost)),
    implicit: Math.max(1, ...(data.changeRipple || []).map(r => r.implicitCouplings.length)),
    blast: Math.max(1, ...data.blastRadius.map(b => b.radius)),
  };
}

// --- Data Loading ---
async function loadData() {
  const resp = await fetch('/api/data');
  data = await resp.json();
  precomputeOverlayData();
  buildTree();
  resetView();
  render();
  statsEl.textContent = `${data.entities.length} entities · ${data.callGraph.length} edges`;
}

// --- Tree Building ---
function buildTree() {
  const root = { name: 'root', children: [], entities: [], depth: 0, path: '' };
  const dirMap = new Map();
  dirMap.set('', root);

  for (const entity of data.entities) {
    const parts = entity.filePath.split('/');
    let current = root;
    let pathSoFar = '';

    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      pathSoFar = pathSoFar ? pathSoFar + '/' + part : part;
      const isFile = i === parts.length - 1;

      if (!dirMap.has(pathSoFar)) {
        const node = { name: part, children: [], entities: [], depth: i + 1, path: pathSoFar };
        dirMap.set(pathSoFar, node);
        current.children.push(node);
      }
      current = dirMap.get(pathSoFar);

      if (isFile) {
        current.entities.push(entity);
      }
    }
  }

  collapseChains(root);
  packed = packCircles(root, 0, 0);
}

function collapseChains(node) {
  for (const child of node.children) collapseChains(child);

  while (node.children.length === 1 && node.entities.length === 0 && node.name !== 'root') {
    const only = node.children[0];
    node.name = node.name + '/' + only.name;
    node.path = only.path;
    node.children = only.children;
    node.entities = only.entities;
  }
}

// --- Circle Packing (D3-style front-chain, O(n²) worst case but fast in practice) ---
function packSiblings(radii) {
  const n = radii.length;
  if (n === 0) return [];
  if (n === 1) return [{ x: 0, y: 0, r: radii[0] }];

  const circles = radii.map(r => ({ x: 0, y: 0, r }));
  const a = circles[0], b = circles[1];
  a.x = -b.r; b.x = a.r;

  if (n === 2) return circles;

  placeCircle(a, b, circles[2]);

  // Linked list for the front chain
  let front = [0, 1, 2];

  for (let i = 3; i < n; i++) {
    const ci = circles[i];
    let bestScore = Infinity, bestJ = 0;

    for (let j = 0; j < front.length; j++) {
      const k = (j + 1) % front.length;
      const fj = circles[front[j]], fk = circles[front[k]];
      placeCircle(fj, fk, ci);

      let overlaps = false;
      for (let m = 0; m < front.length; m++) {
        if (m === j || m === k) continue;
        const fm = circles[front[m]];
        const dx = ci.x - fm.x, dy = ci.y - fm.y;
        if (dx * dx + dy * dy < (ci.r + fm.r - 0.5) * (ci.r + fm.r - 0.5)) {
          overlaps = true; break;
        }
      }

      if (!overlaps) {
        const score = ci.x * ci.x + ci.y * ci.y;
        if (score < bestScore) { bestScore = score; bestJ = j; }
      }
    }

    const bestK = (bestJ + 1) % front.length;
    placeCircle(circles[front[bestJ]], circles[front[bestK]], ci);
    front.splice(bestK, 0, i);
  }

  return circles;
}

function placeCircle(a, b, c) {
  const da = a.r + c.r, db = b.r + c.r;
  const dx = b.x - a.x, dy = b.y - a.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < 1e-10) { c.x = a.x + da; c.y = a.y; return; }

  const cosA = Math.max(-1, Math.min(1, (da * da + d * d - db * db) / (2 * da * d)));
  const angle = Math.atan2(dy, dx) - Math.acos(cosA);
  c.x = a.x + Math.cos(angle) * da;
  c.y = a.y + Math.sin(angle) * da;
}

function encloseCircles(circles) {
  if (circles.length === 0) return { x: 0, y: 0, r: 0 };
  if (circles.length === 1) return { x: circles[0].x, y: circles[0].y, r: circles[0].r };

  // Iterative minimum enclosing circle
  let cx = 0, cy = 0;
  for (const c of circles) { cx += c.x; cy += c.y; }
  cx /= circles.length; cy /= circles.length;

  // Refine center by shifting toward the farthest circle
  for (let iter = 0; iter < 20; iter++) {
    let maxD = 0, farthest = null;
    for (const c of circles) {
      const d = Math.sqrt((c.x - cx) ** 2 + (c.y - cy) ** 2) + c.r;
      if (d > maxD) { maxD = d; farthest = c; }
    }
    if (!farthest) break;
    const dx = farthest.x - cx, dy = farthest.y - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 0.01) break;
    cx += dx * 0.1;
    cy += dy * 0.1;
  }

  let r = 0;
  for (const c of circles) {
    const d = Math.sqrt((c.x - cx) ** 2 + (c.y - cy) ** 2) + c.r;
    if (d > r) r = d;
  }
  return { x: cx, y: cy, r };
}

function packCircles(node, cx, cy) {
  const allChildren = [
    ...node.children.map(c => ({ type: 'dir', node: c })),
    ...node.entities.map(e => ({ type: 'entity', entity: e })),
  ];

  const circle = {
    x: cx, y: cy, r: 0,
    name: node.name, path: node.path, depth: node.depth,
    type: 'group', node, children: [],
  };

  if (allChildren.length === 0) { circle.r = 10; return circle; }

  // Recursively pack children first (bottom-up)
  const childPacked = allChildren.map(item => {
    if (item.type === 'entity') {
      const r = Math.max(6, Math.sqrt(item.entity.metrics.loc) * 3);
      return { type: 'entity', entity: item.entity, r, x: 0, y: 0, name: item.entity.name, depth: node.depth + 1, path: item.entity.filePath };
    }
    return packCircles(item.node, 0, 0);
  });

  // Sort by radius descending for better packing
  childPacked.sort((a, b) => b.r - a.r);
  const radii = childPacked.map(c => c.r);

  // Pack siblings to get relative positions
  const positions = packSiblings(radii);
  const enclosure = encloseCircles(positions);
  const padding = 1.12;

  // Position children relative to this node's center
  for (let i = 0; i < childPacked.length; i++) {
    const offX = positions[i].x - enclosure.x;
    const offY = positions[i].y - enclosure.y;

    if (childPacked[i].type === 'entity') {
      childPacked[i].x = cx + offX;
      childPacked[i].y = cy + offY;
    } else {
      translateTree(childPacked[i], cx + offX - childPacked[i].x, cy + offY - childPacked[i].y);
    }
  }

  circle.children = childPacked;
  circle.r = enclosure.r * (1 + 0.08 / Math.max(1, Math.log2(allChildren.length)));
  return circle;
}

function translateTree(node, dx, dy) {
  node.x += dx;
  node.y += dy;
  if (node.children) {
    for (const child of node.children) translateTree(child, dx, dy);
  }
}

function scaleTree(node, cx, cy, scale) {
  node.x = cx + (node.x - cx) * scale;
  node.y = cy + (node.y - cy) * scale;
  node.r *= scale;
  if (node.children) {
    for (const child of node.children) scaleTree(child, cx, cy, scale);
  }
}

function countEntities(node) {
  let count = node.entities.length;
  for (const child of node.children) count += countEntities(child);
  return count;
}

// --- Color System ---
const GROUP_FILL = 'rgba(30, 30, 50, 0.4)';
const GROUP_STROKE = 'rgba(80, 80, 120, 0.3)';

const SAFETY_COLORS = {
  green:  { fill: 'rgba(40, 180, 80, 0.45)', stroke: 'rgba(40, 180, 80, 0.7)' },
  yellow: { fill: 'rgba(220, 180, 40, 0.45)', stroke: 'rgba(220, 180, 40, 0.7)' },
  red:    { fill: 'rgba(220, 50, 50, 0.5)', stroke: 'rgba(220, 50, 50, 0.8)' },
};

function getColor(circle, overlay) {
  if (circle.type !== 'entity') {
    return { fill: GROUP_FILL, stroke: GROUP_STROKE };
  }

  const e = circle.entity;
  const risk = riskMap.get(e.id);
  const ripple = rippleMap.get(e.id);

  if (overlay === 'safety') {
    const rating = risk ? risk.safetyRating : 'green';
    return SAFETY_COLORS[rating];
  }

  let value = 0;
  const max = overlayMaxCache[overlay] || 1;

  switch (overlay) {
    case 'ripple':
      value = ripple ? ripple.rippleScore : 0;
      break;
    case 'context':
      value = risk ? risk.contextCost : 0;
      break;
    case 'implicit':
      value = ripple ? ripple.implicitCouplings.length : 0;
      break;
    case 'blast': {
      const br = blastMap.get(e.id);
      value = br ? br.radius : 0;
      break;
    }
  }

  const ratio = Math.min(1, value / max);
  const r = Math.round(40 + ratio * 200);
  const g = Math.round(180 - ratio * 140);
  const b = Math.round(80 + (1 - ratio) * 80);
  const alpha = 0.3 + ratio * 0.5;

  return {
    fill: `rgba(${r}, ${g}, ${b}, ${alpha})`,
    stroke: `rgba(${r}, ${g}, ${b}, ${0.5 + ratio * 0.5})`,
  };
}

// --- Rendering ---
function render() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = (window.innerHeight - 48) * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = (window.innerHeight - 48) + 'px';
  canvas.style.marginTop = '48px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  computeViewBounds();

  ctx.save();
  ctx.translate(window.innerWidth / 2, (window.innerHeight - 48) / 2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  if (packed) drawNode(packed);

  ctx.restore();

  if (animating) requestAnimationFrame(animate);
}

let viewBounds = { left: 0, right: 0, top: 0, bottom: 0 };

function computeViewBounds() {
  const hw = window.innerWidth / 2 / camera.zoom;
  const hh = (window.innerHeight - 48) / 2 / camera.zoom;
  viewBounds.left = camera.x - hw;
  viewBounds.right = camera.x + hw;
  viewBounds.top = camera.y - hh;
  viewBounds.bottom = camera.y + hh;
}

function isVisible(node) {
  return node.x + node.r >= viewBounds.left && node.x - node.r <= viewBounds.right &&
         node.y + node.r >= viewBounds.top && node.y - node.r <= viewBounds.bottom;
}

function drawNode(node) {
  if (!isVisible(node)) return;

  const screenR = node.r * camera.zoom;
  if (screenR < 1) return;

  const { fill, stroke } = getColor(node, currentOverlay);

  const isEntity = node.type === 'entity';
  const entityId = isEntity ? node.entity?.id : null;
  const hasBlast = blastHighlight.size > 0;
  const isHighlighted = hasBlast && isEntity && blastHighlight.has(entityId);
  const isSearchMatch = searchTerm && node.name.toLowerCase().includes(searchTerm.toLowerCase());
  const isHovered = node === hoveredNode;
  const isSelected = node === selectedNode;
  const isDimmed = hasBlast && isEntity && !blastHighlight.has(entityId);

  ctx.beginPath();
  ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);

  if (isDimmed) {
    ctx.fillStyle = 'rgba(20, 20, 30, 0.3)';
    ctx.strokeStyle = 'rgba(40, 40, 60, 0.2)';
  } else if (isHighlighted) {
    ctx.fillStyle = 'rgba(139, 92, 246, 0.4)';
    ctx.strokeStyle = 'rgba(139, 92, 246, 0.9)';
  } else if (isSearchMatch) {
    ctx.fillStyle = 'rgba(255, 200, 50, 0.3)';
    ctx.strokeStyle = 'rgba(255, 200, 50, 0.8)';
  } else {
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
  }

  ctx.fill();
  ctx.lineWidth = (isHovered || isSelected) ? 2 / camera.zoom : 1 / camera.zoom;
  if (isHovered || isSelected) ctx.strokeStyle = '#8b5cf6';
  ctx.stroke();

  if (screenR > 20 && node.name && node.name !== 'root') {
    const fontSize = Math.min(14, Math.max(8, node.r * 0.3));
    if (fontSize >= 6) {
      ctx.font = `${fontSize / camera.zoom}px 'SF Mono', 'Fira Code', monospace`;
      ctx.fillStyle = isEntity ? '#e0e0e0' : '#888';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const maxWidth = node.r * 1.6;
      let label = node.name;
      if (ctx.measureText(label).width > maxWidth) {
        while (ctx.measureText(label + '…').width > maxWidth && label.length > 1) {
          label = label.slice(0, -1);
        }
        label += '…';
      }
      ctx.fillText(label, node.x, node.y);
    }
  }

  if (node.children) {
    for (const child of node.children) drawNode(child);
  }
}

// --- Hit Testing ---
function hitTest(wx, wy, node) {
  if (!node) return null;
  const dx = wx - node.x, dy = wy - node.y;
  if (dx * dx + dy * dy > node.r * node.r) return null;

  if (node.children) {
    for (let i = node.children.length - 1; i >= 0; i--) {
      const hit = hitTest(wx, wy, node.children[i]);
      if (hit) return hit;
    }
  }

  return node;
}

function screenToWorld(sx, sy) {
  const cx = window.innerWidth / 2;
  const cy = (window.innerHeight - 48) / 2;
  return {
    x: (sx - cx) / camera.zoom + camera.x,
    y: (sy - cy) / camera.zoom + camera.y,
  };
}

// --- Animation ---
function animate() {
  const ease = 0.12;
  camera.x += (targetCamera.x - camera.x) * ease;
  camera.y += (targetCamera.y - camera.y) * ease;
  camera.zoom += (targetCamera.zoom - camera.zoom) * ease;

  const dx = Math.abs(targetCamera.x - camera.x);
  const dy = Math.abs(targetCamera.y - camera.y);
  const dz = Math.abs(targetCamera.zoom - camera.zoom);

  if (dx < 0.1 && dy < 0.1 && dz < 0.001) {
    camera.x = targetCamera.x;
    camera.y = targetCamera.y;
    camera.zoom = targetCamera.zoom;
    animating = false;
  }

  render();
  if (animating) requestAnimationFrame(animate);
}

function animateTo(x, y, zoom) {
  targetCamera = { x, y, zoom };
  if (!animating) { animating = true; animate(); }
}

function resetView() {
  if (!packed) return;
  // Find the deepest group with multiple children — that's where the interesting stuff is
  let target = packed;
  while (target.children?.length === 1 && target.children[0].type === 'group') {
    target = target.children[0];
  }
  zoomToNode(target);
  zoomStack = [];
  updateBreadcrumb();
}

function zoomToNode(node) {
  const viewSize = Math.min(window.innerWidth, window.innerHeight - 48);
  const zoom = viewSize / (node.r * 2.4);
  animateTo(node.x, node.y, zoom);
}

// --- Tooltip ---
function showTooltip(node, mx, my) {
  if (!node || node.name === 'root') { tooltip.style.display = 'none'; return; }

  let html = '';
  if (node.type === 'entity') {
    const e = node.entity;
    const risk = riskMap.get(e.id);
    const ripple = rippleMap.get(e.id);
    const br = blastMap.get(e.id);

    const safetyColor = { green: '#4ade80', yellow: '#facc15', red: '#ef4444' };
    const safetyLabel = { green: 'SAFE', yellow: 'CAUTION', red: 'DANGER' };
    const rating = risk ? risk.safetyRating : 'green';

    html = `
      <div class="tt-title">${e.name}</div>
      <div class="tt-path">${e.filePath}:${e.startLine}</div>
      <div class="tt-row"><span class="tt-label">Safety</span><span class="tt-value" style="color:${safetyColor[rating]}">${safetyLabel[rating]}</span></div>
      ${risk ? `<div class="tt-row"><span class="tt-label">Context cost</span><span class="tt-value">~${risk.contextCost >= 1000 ? (risk.contextCost / 1000).toFixed(1) + 'k' : risk.contextCost} tokens</span></div>` : ''}
      ${ripple ? `<div class="tt-row"><span class="tt-label">Change ripple</span><span class="tt-value">${ripple.affectedFiles.length} files</span></div>` : ''}
      ${ripple && ripple.implicitCouplings.length > 0 ? `<div class="tt-row"><span class="tt-label">Implicit couplings</span><span class="tt-value" style="color:#facc15">${ripple.implicitCouplings.length}</span></div>` : ''}
      ${br ? `<div class="tt-row"><span class="tt-label">Blast radius</span><span class="tt-value">${br.radius} callers</span></div>` : ''}
      ${risk && risk.riskFactors.length > 0 ? `<div style="margin-top:6px;padding-top:6px;border-top:1px solid #2a2a3a;color:#facc15;font-size:11px">${risk.riskFactors.map(f => '⚠ ' + f).join('<br>')}</div>` : ''}
    `;
  } else {
    const count = countEntities(node.node);
    html = `
      <div class="tt-title">${node.name}/</div>
      <div class="tt-path">${node.path}</div>
      <div class="tt-row"><span class="tt-label">Functions</span><span class="tt-value">${count}</span></div>
    `;
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  const rect = tooltip.getBoundingClientRect();
  let tx = mx + 16, ty = my + 16;
  if (tx + rect.width > window.innerWidth) tx = mx - rect.width - 16;
  if (ty + rect.height > window.innerHeight) ty = my - rect.height - 16;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = ty + 'px';
}

// --- Detail Panel ---
function showDetail(node) {
  if (!node || node.type !== 'entity') return;
  const e = node.entity;
  const br = blastMap.get(e.id);
  const hs = hotspotMap.get(e.id);
  const callees = data.callGraph.filter(edge => edge.caller === e.id);
  const callers = data.callGraph.filter(edge => edge.callee === e.id);

  const risk = riskMap.get(e.id);
  const ripple = rippleMap.get(e.id);
  const safetyColor = { green: '#4ade80', yellow: '#facc15', red: '#ef4444' };
  const safetyLabel = { green: '● SAFE', yellow: '● CAUTION', red: '● DANGER' };
  const rating = risk ? risk.safetyRating : 'green';

  let html = `
    <div class="dp-title">${e.name}</div>
    <div class="dp-path">${e.filePath}:${e.startLine}-${e.endLine} · ${e.kind}</div>
    <div style="font-size:14px;font-weight:700;color:${safetyColor[rating]};margin:8px 0">${safetyLabel[rating]}</div>

    <div class="dp-section">
      <h3>Agent Risk</h3>
      ${risk ? `<div class="dp-metric"><span>Context Cost</span><span>~${risk.contextCost >= 1000 ? (risk.contextCost / 1000).toFixed(1) + 'k' : risk.contextCost} tokens</span></div>` : ''}
      ${ripple ? `<div class="dp-metric"><span>Change Ripple</span><span>${ripple.affectedFiles.length} files</span></div>` : ''}
      ${ripple ? `<div class="dp-metric"><span>Implicit Couplings</span><span style="color:${ripple.implicitCouplings.length > 0 ? '#facc15' : '#666'}">${ripple.implicitCouplings.length}</span></div>` : ''}
      ${br ? `<div class="dp-metric"><span>Blast Radius</span><span>${br.radius} callers</span></div>` : ''}
      <div class="dp-metric"><span>LOC</span><span>${e.metrics.loc}</span></div>
    </div>
  `;

  if (risk && risk.riskFactors.length > 0) {
    html += `<div class="dp-section"><h3>Risk Factors</h3>`;
    for (const f of risk.riskFactors) {
      html += `<div style="padding:4px 0;color:#facc15;font-size:12px">⚠ ${f}</div>`;
    }
    html += '</div>';
  }

  if (ripple && ripple.affectedFiles.length > 0) {
    html += `<div class="dp-section"><h3>Change Ripple (${ripple.affectedFiles.length} files)</h3>`;
    for (const f of ripple.affectedFiles) {
      const isImplicit = ripple.implicitCouplings.some(ic => ic.filePath === f);
      html += `<div class="dp-caller" style="${isImplicit ? 'border-left:2px solid #facc15;' : ''}">${f}${isImplicit ? ' <span style="color:#facc15;font-size:10px">implicit</span>' : ''}</div>`;
    }
    html += '</div>';
  }

  if (ripple && ripple.implicitCouplings.length > 0) {
    html += `<div class="dp-section"><h3>Implicit Couplings</h3>`;
    html += `<div style="color:#888;font-size:11px;margin-bottom:8px">Files that co-change without import links — agents will miss these</div>`;
    for (const ic of ripple.implicitCouplings) {
      html += `<div class="dp-caller" style="border-left:2px solid #facc15">${ic.filePath} <span style="color:#facc15;font-size:10px">${Math.round(ic.cochangeRate * 100)}% co-change</span></div>`;
    }
    html += '</div>';
  }

  if (callers.length > 0) {
    html += `<div class="dp-section"><h3>Called By (${callers.length})</h3>`;
    for (const edge of callers) {
      const caller = data.entities.find(x => x.id === edge.caller);
      if (caller) html += `<div class="dp-caller" onclick="focusEntity('${edge.caller}')">${caller.filePath}:${caller.name}</div>`;
    }
    html += '</div>';
  }

  if (callees.length > 0) {
    html += `<div class="dp-section"><h3>Calls (${callees.length})</h3>`;
    for (const edge of callees) {
      const callee = data.entities.find(x => x.id === edge.callee);
      if (callee) html += `<div class="dp-caller" onclick="focusEntity('${edge.callee}')">${callee.filePath}:${callee.name}</div>`;
    }
    html += '</div>';
  }

  if (br && br.transitiveCallers.length > 0) {
    html += `<div class="dp-section"><h3>Blast Radius (${br.transitiveCallers.length})</h3>`;
    html += `<button class="overlay-btn" style="margin-bottom:8px" onclick="toggleBlastHighlight('${e.id}')">
      ${blastHighlight.size > 0 ? 'Clear' : 'Highlight'} Blast Radius
    </button>`;
    for (const callerId of br.transitiveCallers.slice(0, 20)) {
      const caller = data.entities.find(x => x.id === callerId);
      if (caller) html += `<div class="dp-caller" onclick="focusEntity('${callerId}')">${caller.filePath}:${caller.name}</div>`;
    }
    if (br.transitiveCallers.length > 20) {
      html += `<div style="color:#666;padding:4px 8px">...and ${br.transitiveCallers.length - 20} more</div>`;
    }
    html += '</div>';
  }

  document.getElementById('detail-content').innerHTML = html;
  detailPanel.classList.add('open');
}

function closeDetail() {
  detailPanel.classList.remove('open');
  selectedNode = null;
  blastHighlight.clear();
  scheduleRender();
}

// --- Blast Radius Highlighting ---
window.toggleBlastHighlight = function(entityId) {
  if (blastHighlight.size > 0) {
    blastHighlight.clear();
  } else {
    const br = data.blastRadius.find(b => b.entityId === entityId);
    if (br) {
      blastHighlight.add(entityId);
      for (const id of br.transitiveCallers) blastHighlight.add(id);
    }
  }
  scheduleRender();
  if (selectedNode) showDetail(selectedNode);
};

window.focusEntity = function(entityId) {
  const node = findNodeByEntityId(packed, entityId);
  if (node) {
    zoomToNode(node);
    selectedNode = node;
    showDetail(node);
  }
};

function findNodeByEntityId(node, entityId) {
  if (node.type === 'entity' && node.entity?.id === entityId) return node;
  if (node.children) {
    for (const child of node.children) {
      const found = findNodeByEntityId(child, entityId);
      if (found) return found;
    }
  }
  return null;
}

// --- Breadcrumb ---
function updateBreadcrumb() {
  let html = '<span onclick="resetView()">root</span>';
  for (let i = 0; i < zoomStack.length; i++) {
    const node = zoomStack[i];
    html += '<span class="bc-sep">›</span>';
    html += `<span onclick="zoomToBreadcrumb(${i})">${node.name}</span>`;
  }
  breadcrumb.innerHTML = html;
}

window.zoomToBreadcrumb = function(idx) {
  const node = zoomStack[idx];
  zoomStack = zoomStack.slice(0, idx + 1);
  zoomToNode(node);
  updateBreadcrumb();
};

// --- Event Handlers ---
canvas.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const dx = (e.clientX - dragStart.x) / camera.zoom;
    const dy = (e.clientY - dragStart.y) / camera.zoom;
    targetCamera.x = camera.x -= dx;
    targetCamera.y = camera.y -= dy;
    dragStart = { x: e.clientX, y: e.clientY };
    scheduleRender();
    return;
  }

  const { x, y } = screenToWorld(e.clientX, e.clientY - 48);
  const hit = hitTest(x, y, packed);
  const changed = hit !== hoveredNode;
  hoveredNode = hit;
  canvas.style.cursor = hit ? 'pointer' : 'grab';
  showTooltip(hit, e.clientX, e.clientY);
  if (changed) scheduleRender();
});

canvas.addEventListener('mousedown', (e) => {
  dragStart = { x: e.clientX, y: e.clientY };
  isDragging = false;
});

canvas.addEventListener('mousemove', (e) => {
  if (dragStart && !isDragging) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) + Math.abs(dy) > 4) isDragging = true;
  }
}, { capture: true });

canvas.addEventListener('mouseup', (e) => {
  if (!isDragging) {
    const { x, y } = screenToWorld(e.clientX, e.clientY - 48);
    const clicked = hitTest(x, y, packed);
    if (clicked && clicked.name !== 'root') {
      if (clicked.type === 'group' && clicked.children?.length > 0) {
        zoomStack.push(clicked);
        zoomToNode(clicked);
        updateBreadcrumb();
      } else if (clicked.type === 'entity') {
        selectedNode = clicked;
        showDetail(clicked);
      }
    }
  }
  dragStart = null;
  isDragging = false;
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = camera.zoom * factor;
  if (newZoom < 0.1 || newZoom > 100) return;

  const { x: wx, y: wy } = screenToWorld(e.clientX, e.clientY - 48);
  targetCamera.zoom = newZoom;
  targetCamera.x = wx - (wx - camera.x) * (camera.zoom / newZoom);
  targetCamera.y = wy - (wy - camera.y) * (camera.zoom / newZoom);
  camera = { ...targetCamera };
  scheduleRender();
}, { passive: false });

canvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  if (zoomStack.length > 0) {
    zoomStack.pop();
    const target = zoomStack.length > 0 ? zoomStack[zoomStack.length - 1] : packed;
    zoomToNode(target);
    updateBreadcrumb();
  } else {
    resetView();
  }
});

canvas.addEventListener('mouseleave', () => {
  hoveredNode = null;
  tooltip.style.display = 'none';
  scheduleRender();
});

// Overlay buttons
document.querySelectorAll('.overlay-btn[data-overlay]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.overlay-btn[data-overlay]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentOverlay = btn.dataset.overlay;
    scheduleRender();
  });
});

// Search
searchInput.addEventListener('input', (e) => {
  searchTerm = e.target.value;
  searchMatchIdx = 0;
  scheduleRender();
});

function findAllMatches(node, term, results) {
  if (!term) return results;
  const lower = term.toLowerCase();
  if (node.name && node.name.toLowerCase().includes(lower)) results.push(node);
  if (node.children) for (const c of node.children) findAllMatches(c, term, results);
  return results;
}

let searchMatchIdx = 0;

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && searchTerm) {
    e.preventDefault();
    const matches = findAllMatches(packed, searchTerm, []);
    if (matches.length > 0) {
      const node = matches[searchMatchIdx % matches.length];
      searchMatchIdx = (searchMatchIdx + 1) % matches.length;
      zoomToNode(node);
      if (node.type === 'entity') {
        selectedNode = node;
        showDetail(node);
      }
      statsEl.textContent = `Match ${searchMatchIdx}/${matches.length} · ${data.entities.length} entities · ${data.callGraph.length} edges`;
    }
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.blur();
    searchTerm = '';
    searchInput.value = '';
    searchMatchIdx = 0;
    closeDetail();
    scheduleRender();
    if (data) statsEl.textContent = `${data.entities.length} entities · ${data.callGraph.length} edges`;
  }
  if (document.activeElement === searchInput) return;
  if (e.key === '0') resetView();
  if (e.key >= '1' && e.key <= '5') {
    const overlays = ['safety', 'ripple', 'context', 'implicit', 'blast'];
    const idx = parseInt(e.key) - 1;
    if (idx < overlays.length) {
      currentOverlay = overlays[idx];
      document.querySelectorAll('.overlay-btn[data-overlay]').forEach(b => {
        b.classList.toggle('active', b.dataset.overlay === currentOverlay);
      });
      scheduleRender();
    }
  }
});

window.addEventListener('resize', () => scheduleRender());

loadData();
</script>
</body>
</html>
